<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      user-select: none;
    }
    .brand { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.05em; color: #d4af37; }
    .sub   { font-size: 0.8rem; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #333;
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .msg { font-size: 0.75rem; color: #666; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="brand">The Melva</div>
  <div class="sub">Elegant Guest House</div>
  <div class="spinner"></div>
  <div class="msg">Starting up…</div>
</body>
</html>
